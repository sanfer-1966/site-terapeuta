<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Dra. Ana Souza</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
    }

    .login-card {
      background: var(--white);
      padding: 2.5rem;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .login-logo .logo-icon {
      font-size: 2rem;
      color: var(--primary);
    }

    .login-logo .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--secondary);
    }

    .login-title {
      color: var(--text);
      font-size: 1.25rem;
    }

    .login-form .form-group {
      margin-bottom: 1.5rem;
    }

    .login-form .btn {
      margin-top: 0.5rem;
    }

    .login-error {
      background: rgba(220, 53, 69, 0.1);
      border: 1px solid rgba(220, 53, 69, 0.3);
      color: #dc3545;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      display: none;
      font-size: 0.9rem;
    }

    .login-error.show {
      display: block;
    }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
    }

    .login-footer a {
      color: var(--primary);
      font-size: 0.875rem;
    }

    .login-footer a:hover {
      color: var(--primary-dark);
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray);
      font-size: 1.2rem;
      padding: 4px;
      line-height: 1;
      transition: color 0.2s;
    }

    .password-toggle:hover {
      color: var(--primary);
    }
  </style>
</head>
<body>
  <main class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <div class="login-logo">
            <span class="logo-icon">&#9825;</span>
            <span class="logo-text">Dra. Ana Souza</span>
          </div>
          <h1 class="login-title">Acesso ao Painel</h1>
        </div>

        <div class="login-error" id="loginError"></div>

        <form class="login-form" id="loginForm">
          <div class="form-group">
            <label for="username">Usuário</label>
            <input type="text" id="username" name="username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="password">Senha</label>
            <div class="password-wrapper">
              <input type="password" id="password" name="password" required autocomplete="current-password">
              <button type="button" class="password-toggle" id="togglePassword" aria-label="Mostrar senha">&#128065;</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Entrar</button>
        </form>

        <div class="login-footer">
          <a href="index.html">← Voltar para o site</a>
        </div>
      </div>
    </div>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
