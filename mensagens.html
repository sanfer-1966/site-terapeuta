<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensagens Recebidas | Dra. Ana Souza</title>
  <meta name="description" content="Painel de mensagens recebidas pelo formulário de contato.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="canonical" href="https://dodgerblue-anteater-184264.hostingersite.com/mensagens.html">

  <!-- Open Graph -->
  <meta property="og:title" content="Mensagens Recebidas | Dra. Ana Souza">
  <meta property="og:description" content="Painel de mensagens recebidas pelo formulário de contato.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dodgerblue-anteater-184264.hostingersite.com/mensagens.html">
  <meta property="og:locale" content="pt_BR">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1a14;
      color: #dce8e1;
      padding: 2rem;
      min-height: 100vh;
    }
    h1 { text-align: center; margin-bottom: 2rem; color: #a8d4ba; }
    .container { max-width: 900px; margin: 0 auto; }
    .msg {
      background: #18241e;
      border-left: 4px solid #6baa8e;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .msg-header { display: flex; justify-content: space-between; margin-bottom: 0.75rem; }
    .msg-id { color: #6baa8e; font-weight: 700; }
    .msg-date { color: #7a8f82; font-size: 0.85rem; }
    .msg-field { margin-bottom: 0.5rem; }
    .msg-label { color: #a3b8ac; font-weight: 600; }
    .msg-value { color: #dce8e1; }
    .empty { text-align: center; color: #7a8f82; padding: 3rem; }
    .btn { display: inline-block; padding: 0.5rem 1rem; background: #6baa8e; color: #0f1a14; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; text-decoration: none; margin-bottom: 1.5rem; }
    .btn:hover { background: #5b9a7e; }
    .actions { display: flex; justify-content: space-between; align-items: center; }
    #count { color: #7a8f82; }
  </style>
</head>
<body>
  <div class="container">
    <div class="actions">
      <h1>Mensagens Recebidas</h1>
      <a href="/" class="btn">Voltar ao Site</a>
    </div>
    <p id="count"></p>
    <div id="messages"></div>
  </div>
  <script>
    async function loadMessages() {
      const res = await fetch('/api/mensagens');
      const data = await res.json();
      const container = document.getElementById('messages');
      const count = document.getElementById('count');

      if (data.length === 0) {
        container.innerHTML = '<p class="empty">Nenhuma mensagem recebida.</p>';
        return;
      }

      count.textContent = `${data.length} mensagem(ns)`;
      container.innerHTML = data.map(m => `
        <div class="msg">
          <div class="msg-header">
            <span class="msg-id">#${m.id}</span>
            <span class="msg-date">${m.data}</span>
          </div>
          <div class="msg-field"><span class="msg-label">Nome:</span> <span class="msg-value">${m.nome}</span></div>
          <div class="msg-field"><span class="msg-label">E-mail:</span> <span class="msg-value">${m.email}</span></div>
          <div class="msg-field"><span class="msg-label">Telefone:</span> <span class="msg-value">${m.telefone || 'Não informado'}</span></div>
          <div class="msg-field"><span class="msg-label">Mensagem:</span> <span class="msg-value">${m.mensagem}</span></div>
        </div>
      `).join('');
    }
    loadMessages();
  </script>
</body>
</html>
