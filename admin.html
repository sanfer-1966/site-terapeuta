<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - Dra. Ana Souza</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-page {
      min-height: 100vh;
      padding: 2rem;
      padding-top: 6rem;
    }

    .admin-container {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .admin-title {
      color: var(--secondary);
    }

    .admin-actions {
      display: flex;
      gap: 1rem;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--gray-light);
      color: var(--text-light);
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: var(--gray-light);
      color: var(--text);
    }

    .messages-count {
      color: var(--text-light);
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }

    .messages-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .message-name {
      color: var(--secondary);
      font-weight: 600;
    }

    .message-date {
      color: var(--gray);
      font-size: 0.75rem;
    }

    .message-contact {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .message-contact span {
      color: var(--text-light);
      font-size: 0.875rem;
    }

    .message-contact a {
      color: var(--primary);
    }

    .message-text {
      color: var(--text);
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-light);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-light);
    }

    @media (max-width: 600px) {
      .admin-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <nav class="navbar">
      <a href="index.html" class="logo">
        <span class="logo-icon">&#9825;</span>
        <span class="logo-text">Dra. Ana Souza</span>
      </a>
      <div class="admin-actions">
        <button class="btn-logout" id="logoutBtn">Sair</button>
      </div>
    </nav>
  </header>

  <main class="admin-page">
    <div class="admin-container">
      <div class="admin-header">
        <h1 class="admin-title">Mensagens Recebidas</h1>
      </div>

      <div class="messages-count" id="messagesCount"></div>

      <div class="messages-list" id="messagesList">
        <div class="loading">Carregando mensagens...</div>
      </div>
    </div>
  </main>

  <script src="js/admin.js"></script>
</body>
</html>
