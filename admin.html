<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - Dra. Ana Souza</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-page {
      min-height: 100vh;
      padding: 2rem;
      padding-top: 6rem;
    }

    .admin-container {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .admin-title {
      color: var(--secondary);
    }

    .admin-actions {
      display: flex;
      gap: 1rem;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--gray-light);
      color: var(--text-light);
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: var(--gray-light);
      color: var(--text);
    }

    .messages-count {
      color: var(--text-light);
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }

    .messages-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .message-name {
      color: var(--secondary);
      font-weight: 600;
    }

    .message-date {
      color: var(--gray);
      font-size: 0.75rem;
    }

    .message-contact {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .message-contact span {
      color: var(--text-light);
      font-size: 0.875rem;
    }

    .message-contact a {
      color: var(--primary);
    }

    .message-text {
      color: var(--text);
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-light);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-light);
    }

    .search-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .search-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid var(--gray-light);
      border-radius: var(--radius);
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--white);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .search-btn {
      padding: 0.75rem 1.25rem;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .search-btn:hover {
      background: var(--primary-dark);
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .pagination button {
      padding: 0.5rem 1rem;
      background: var(--white);
      color: var(--text);
      border: 1px solid var(--gray-light);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
    }

    .pagination button:hover:not(:disabled) {
      background: var(--primary-light);
      border-color: var(--primary);
    }

    .pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .pagination button.active {
      background: var(--primary);
      color: var(--white);
      border-color: var(--primary);
    }

    .pagination-info {
      color: var(--text-light);
      font-size: 0.875rem;
      margin: 0 0.5rem;
    }

    .btn-delete {
      background: transparent;
      border: 1px solid rgba(220, 53, 69, 0.3);
      color: #dc3545;
      padding: 0.375rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
    }

    .btn-delete:hover {
      background: rgba(220, 53, 69, 0.1);
    }

    .btn-edit {
      background: transparent;
      border: 1px solid rgba(107, 170, 142, 0.3);
      color: var(--primary);
      padding: 0.375rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
    }

    .btn-edit:hover {
      background: rgba(107, 170, 142, 0.1);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 1rem;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--white);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(-20px);
      transition: transform 0.3s;
    }

    .modal-overlay.active .modal {
      transform: translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .modal-title {
      color: var(--secondary);
      font-size: 1.25rem;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-light);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.25rem;
      line-height: 1;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .modal-form .form-group {
      margin-bottom: 1rem;
    }

    .modal-form label {
      display: block;
      margin-bottom: 0.375rem;
      font-weight: 600;
      color: var(--secondary);
      font-size: 0.9rem;
    }

    .modal-form input,
    .modal-form textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--gray-light);
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
    }

    .modal-form input:focus,
    .modal-form textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    .modal-form textarea {
      resize: vertical;
      min-height: 100px;
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .btn-save {
      flex: 1;
      padding: 0.75rem;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn-save:hover {
      background: var(--primary-dark);
    }

    .btn-cancel {
      flex: 1;
      padding: 0.75rem;
      background: transparent;
      color: var(--text-light);
      border: 1px solid var(--gray-light);
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-cancel:hover {
      background: var(--gray-light);
    }

    @media (max-width: 600px) {
      .admin-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <nav class="navbar">
      <a href="index.html" class="logo">
        <span class="logo-icon">&#9825;</span>
        <span class="logo-text">Dra. Ana Souza</span>
      </a>
      <div class="admin-actions">
        <button class="btn-logout" id="logoutBtn">Sair</button>
      </div>
    </nav>
  </header>

  <main class="admin-page">
    <div class="admin-container">
      <div class="admin-header">
        <h1 class="admin-title">Mensagens Recebidas</h1>
      </div>

      <div class="messages-count" id="messagesCount"></div>

      <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="Buscar por nome, email ou mensagem...">
        <button class="search-btn" id="searchBtn">Buscar</button>
      </div>

      <div class="messages-list" id="messagesList">
        <div class="loading">Carregando mensagens...</div>
      </div>

      <div class="pagination" id="pagination"></div>
    </div>
  </main>

  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Editar Mensagem</h2>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <form class="modal-form" id="editForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="editNome">Nome</label>
          <input type="text" id="editNome" required>
        </div>
        <div class="form-group">
          <label for="editEmail">E-mail</label>
          <input type="email" id="editEmail" required>
        </div>
        <div class="form-group">
          <label for="editTelefone">Telefone</label>
          <input type="tel" id="editTelefone">
        </div>
        <div class="form-group">
          <label for="editMensagem">Mensagem</label>
          <textarea id="editMensagem" rows="4" required></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="cancelEdit">Cancelar</button>
          <button type="submit" class="btn-save">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
